<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Van Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial; }
        h1 { color: #e94560; font-size: 28px; margin-bottom: 10px; }
        #bilgi { color: #aaa; font-size: 13px; margin-bottom: 15px; }
        canvas { border: 3px solid #e94560; border-radius: 8px; }
        #skor-panel { display: flex; gap: 30px; margin-top: 12px; }
        .skor-kart { color: white; text-align: center; }
        .skor-kart .deger { font-size: 22px; font-weight: bold; color: #e94560; }
        .skor-kart .label { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <h1>🏃 Van Runner</h1>
    <div id="bilgi">← → Hareket | ↑ Zıpla | Çift ↑ Çift Zıpla</div>
    <canvas id="oyun" width="800" height="400"></canvas>
    <div id="skor-panel">
        <div class="skor-kart"><div class="deger" id="skor">0</div><div class="label">Skor</div></div>
        <div class="skor-kart"><div class="deger" id="en-yuksek">0</div><div class="label">En Yüksek</div></div>
        <div class="skor-kart"><div class="deger" id="seviye">1</div><div class="label">Seviye</div></div>
        <div class="skor-kart"><div class="deger" id="can">3</div><div class="label">Can ❤️</div></div>
    </div>

<script>
const canvas = document.getElementById("oyun");
const ctx = canvas.getContext("2d");

// Oyun değişkenleri
let skor = 0, enYuksek = 0, seviye = 1, can = 3;
let oyunDurumu = "baslamadi"; // baslamadi, oynuyor, bitti

// Oyuncu
const oyuncu = {
    x: 80, y: 300, w: 36, h: 48,
    vx: 0, vy: 0,
    zıplamaHakki: 2,
    yerde: false,
    renk: "#e94560",
    animKare: 0
};

// Platformlar
let platformlar = [
    { x: 0, y: 370, w: 800, h: 30 },    // zemin
    { x: 150, y: 280, w: 120, h: 15 },
    { x: 350, y: 230, w: 100, h: 15 },
    { x: 500, y: 300, w: 80, h: 15 },
    { x: 620, y: 200, w: 120, h: 15 },
];

// Engeller
let engeller = [];
let engelZamani = 0;

// Partiküller
let parcaciklar = [];

// Arka plan yıldızlar
let yildizlar = Array.from({length: 60}, () => ({
    x: Math.random() * 800,
    y: Math.random() * 300,
    r: Math.random() * 2 + 0.5,
    parlaklik: Math.random()
}));

// Tuş kontrolü
const tuslar = {};
document.addEventListener("keydown", e => {
    tuslar[e.key] = true;
    if ((e.key === "ArrowUp" || e.key === " ") && oyuncu.zıplamaHakki > 0) {
        oyuncu.vy = -13;
        oyuncu.zıplamaHakki--;
        parcacikEkle(oyuncu.x + oyuncu.w/2, oyuncu.y + oyuncu.h, "#4fc3f7", 8);
    }
    if (e.key === "Enter" && oyunDurumu !== "oynuyor") {
        oyunuBaslat();
    }
});
document.addEventListener("keyup", e => tuslar[e.key] = false);

function oyunuBaslat() {
    skor = 0; seviye = 1; can = 3;
    oyuncu.x = 80; oyuncu.y = 300;
    oyuncu.vx = 0; oyuncu.vy = 0;
    engeller = [];
    engelZamani = 0;
    oyunDurumu = "oynuyor";
}

function parcacikEkle(x, y, renk, sayi) {
    for (let i = 0; i < sayi; i++) {
        parcaciklar.push({
            x, y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 2) * 4,
            r: Math.random() * 5 + 2,
            renk,
            omur: 1.0
        });
    }
}

function engelEkle() {
    const tur = Math.floor(Math.random() * 3);
    if (tur === 0) {
        // Normal engel
        engeller.push({ x: 810, y: 330, w: 28, h: 40, renk: "#ff5252", tip: "normal" });
    } else if (tur === 1) {
        // Uçan engel
        engeller.push({ x: 810, y: 200 + Math.random() * 100, w: 30, h: 30, renk: "#ffeb3b", tip: "ucuyor", vy: 2, yon: 1 });
    } else {
        // Platform engeli
        engeller.push({ x: 810, y: 250, w: 25, h: 50, renk: "#ab47bc", tip: "normal" });
    }
}

function guncelle() {
    if (oyunDurumu !== "oynuyor") return;

    // Oyuncu hareketi
    if (tuslar["ArrowLeft"]) oyuncu.vx = -5;
    else if (tuslar["ArrowRight"]) oyuncu.vx = 5;
    else oyuncu.vx *= 0.8;

    oyuncu.vy += 0.6; // yerçekimi
    oyuncu.x += oyuncu.vx;
    oyuncu.y += oyuncu.vy;

    // Sınır kontrolü
    if (oyuncu.x < 0) oyuncu.x = 0;
    if (oyuncu.x + oyuncu.w > 800) oyuncu.x = 800 - oyuncu.w;

    // Platform çarpışması
    oyuncu.yerde = false;
    for (let p of platformlar) {
        if (oyuncu.x + oyuncu.w > p.x && oyuncu.x < p.x + p.w &&
            oyuncu.y + oyuncu.h > p.y && oyuncu.y + oyuncu.h < p.y + p.h + oyuncu.vy + 5 &&
            oyuncu.vy >= 0) {
            oyuncu.y = p.y - oyuncu.h;
            oyuncu.vy = 0;
            oyuncu.yerde = true;
            oyuncu.zıplamaHakki = 2;
        }
    }

    // Düşme kontrolü
    if (oyuncu.y > 500) {
        can--;
        parcacikEkle(oyuncu.x, oyuncu.y, "#e94560", 15);
        oyuncu.x = 80; oyuncu.y = 300;
        oyuncu.vy = 0;
        if (can <= 0) oyunDurumu = "bitti";
    }

    // Engel ekleme
    engelZamani++;
    const engelAralik = Math.max(60, 120 - seviye * 10);
    if (engelZamani > engelAralik) {
        engelEkle();
        engelZamani = 0;
    }

    // Engelleri güncelle
    const hiz = 3 + seviye * 0.5;
    engeller = engeller.filter(e => e.x > -50);
    for (let e of engeller) {
        e.x -= hiz;
        if (e.tip === "ucuyor") {
            e.y += e.vy * e.yon;
            if (e.y < 150 || e.y > 320) e.yon *= -1;
        }

        // Çarpışma
        if (oyuncu.x + oyuncu.w - 5 > e.x && oyuncu.x + 5 < e.x + e.w &&
            oyuncu.y + oyuncu.h - 5 > e.y && oyuncu.y + 5 < e.y + e.h) {
            can--;
            parcacikEkle(e.x + e.w/2, e.y + e.h/2, e.renk, 12);
            engeller = engeller.filter(en => en !== e);
            if (can <= 0) oyunDurumu = "bitti";
        }
    }

    // Skor ve seviye
    skor++;
    seviye = Math.floor(skor / 300) + 1;
    if (skor > enYuksek) enYuksek = skor;

    // Partiküller
    parcaciklar = parcaciklar.filter(p => p.omur > 0);
    for (let p of parcaciklar) {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.2;
        p.omur -= 0.03;
    }

    // Yıldızlar titreme
    for (let y of yildizlar) y.parlaklik = 0.3 + Math.random() * 0.7;

    // Panel güncelle
    document.getElementById("skor").textContent = skor;
    document.getElementById("en-yuksek").textContent = enYuksek;
    document.getElementById("seviye").textContent = seviye;
    document.getElementById("can").textContent = "❤️".repeat(can);
}

function ciz() {
    // Arka plan
    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(0, 0, 800, 400);

    // Yıldızlar
    for (let y of yildizlar) {
        ctx.globalAlpha = y.parlaklik;
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(y.x, y.y, y.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Platformlar
    for (let p of platformlar) {
        const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
        grad.addColorStop(0, "#4a90d9");
        grad.addColorStop(1, "#2c5f8a");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(p.x, p.y, p.w, p.h, 4);
        ctx.fill();
    }

    // Engeller
    for (let e of engeller) {
        ctx.fillStyle = e.renk;
        ctx.beginPath();
        ctx.roundRect(e.x, e.y, e.w, e.h, 4);
        ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(e.x + 5, e.y + 5, e.w - 10, 5);
    }

    // Partiküller
    for (let p of parcaciklar) {
        ctx.globalAlpha = p.omur;
        ctx.fillStyle = p.renk;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Oyuncu
    oyuncu.animKare += 0.2;
    const sallanma = oyuncu.yerde ? Math.sin(oyuncu.animKare) * 2 : 0;
    
    // Gövde
    ctx.fillStyle = oyuncu.renk;
    ctx.beginPath();
    ctx.roundRect(oyuncu.x, oyuncu.y + sallanma, oyuncu.w, oyuncu.h, 8);
    ctx.fill();
    
    // Yüz
    ctx.fillStyle = "#ffcc80";
    ctx.beginPath();
    ctx.arc(oyuncu.x + oyuncu.w/2, oyuncu.y + 14 + sallanma, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Gözler
    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.arc(oyuncu.x + oyuncu.w/2 - 3, oyuncu.y + 12 + sallanma, 2, 0, Math.PI * 2);
    ctx.arc(oyuncu.x + oyuncu.w/2 + 3, oyuncu.y + 12 + sallanma, 2, 0, Math.PI * 2);
    ctx.fill();

    // Başlangıç ekranı
    if (oyunDurumu === "baslamadi") {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#e94560";
        ctx.font = "bold 42px Arial";
        ctx.textAlign = "center";
        ctx.fillText("VAN RUNNER", 400, 160);
        ctx.fillStyle = "white";
        ctx.font = "18px Arial";
        ctx.fillText("← → Hareket  |  ↑ veya Boşluk: Zıpla", 400, 210);
        ctx.fillText("Çift ↑ = Çift Zıplama!", 400, 240);
        ctx.fillStyle = "#4fc3f7";
        ctx.font = "bold 22px Arial";
        ctx.fillText("[ ENTER ] Başla", 400, 300);
    }

    // Oyun bitti ekranı
    if (oyunDurumu === "bitti") {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#e94560";
        ctx.font = "bold 42px Arial";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ!", 400, 150);
        ctx.fillStyle = "white";
        ctx.font = "22px Arial";
        ctx.fillText(`Skorun: ${skor}`, 400, 200);
        ctx.fillText(`En Yüksek: ${enYuksek}`, 400, 235);
        ctx.fillStyle = "#4fc3f7";
        ctx.font = "bold 22px Arial";
        ctx.fillText("[ ENTER ] Tekrar Oyna", 400, 300);
    }
}

function oyunDongusu() {
    guncelle();
    ciz();
    requestAnimationFrame(oyunDongusu);
}

oyunDongusu();
</script>
</body>
</html>
